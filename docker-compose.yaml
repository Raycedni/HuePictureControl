services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    # NOTE: host networking doesn't work on WSL2 Docker Desktop — using bridge + ports instead
    # For DTLS/UDP to Hue Bridge, we rely on Docker's default bridge which has LAN access on WSL2
    ports:
      - "8001:8000"   # REST API
      - "2100:2100/udp"  # DTLS Entertainment API
    device_cgroup_rules:
      - 'c 81:* rw'    # All V4L2 video devices (major 81) — hot-plug capable
    group_add:
      - video           # Required: host video group GID for /dev/video* access
    # Multi-device setup and WSL2/usbipd walkthrough: see SETUP.md
    volumes:
      - hue_data:/app/data  # INFR-05: SQLite persistence
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_PATH=/app/data/config.db
      - MIN_REGION_AREA=0.010  # Minimum polygon area in normalized [0..1] space (0.001 = 0.1% of canvas)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./Frontend
    ports:
      - "8091:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Makes host.docker.internal resolve to host on Linux
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hue_data:
