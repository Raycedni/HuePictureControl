services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    # NOTE: host networking doesn't work on WSL2 Docker Desktop — using bridge + ports instead
    # For DTLS/UDP to Hue Bridge, we rely on Docker's default bridge which has LAN access on WSL2
    ports:
      - "8000:8000"   # REST API
      - "2100:2100/udp"  # DTLS Entertainment API
    # devices:
    #   - "/dev/video0:/dev/video0"  # INFR-02: USB capture card passthrough — uncomment when capture card is connected
    # group_add:
    #   - video  # Required for /dev/video0 device access (host GID 44)
    volumes:
      - hue_data:/app/data  # INFR-05: SQLite persistence
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_PATH=/app/data/config.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./Frontend
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Makes host.docker.internal resolve to host on Linux
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hue_data:
